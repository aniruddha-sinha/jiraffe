[tools]
go = "1.25"
"go:github.com/spf13/cobra-cli" = "latest"
ggshield = "latest"
gofumpt = "v0.9.2"
golangci-lint = "2.11.4"
hk = "1.43.0"
pkl = "latest"
watchexec = "latest"
"go:github.com/go-critic/go-critic/cmd/gocritic" = "latest"

[tasks.clean]
description = "Remove old binaries and coverage reports"
run = ["rm -rf bin/"]

[tasks.lint]
description = "linter run"
run = "golangci-lint run"
depends = ["lint_fix"]

[tasks."lint_fix"]
description = "go formatting fix"
run = ["golangci-lint run --fix ./...", "gofumpt -w ."]

[tasks."test:run"]
description = "Run go tests and generate coverage profile"
run = """
#!/usr/bin/env bash
rm -rf test-coverage/
mkdir -p test-coverage

# Look for at least one test file efficiently
if [ -z "$(find . -name '*_test.go' -print -quit)" ]; then
  echo "⚠️  WARNING: No test files found. Skipping tests."
  echo "mode: set" > test-coverage/cover.out
  exit 0
fi

# 1. Run tests and capture the exit code (do not exit yet)
go test ./internal -v -coverprofile=test-coverage/cover.out
TEST_EXIT_CODE=$?

# 2. Generate HTML report regardless of test success/failure
go tool cover -html=test-coverage/cover.out -o test-coverage/index.html

# 3. If tests failed, fail the mise task now so the build doesn't run
if [ $TEST_EXIT_CODE -ne 0 ]; then
  echo "❌ Tests failed! Halting pipeline."
  exit $TEST_EXIT_CODE
fi
"""

[tasks."test:coverage"]
description = "Generate HTML coverage report"
depends = ["test:run"]
run = "go tool cover -html=test-coverage/cover.out -o test-coverage/index.html"

[tasks.critic]
description = "Run go-critic linter on all packages"
run = "gocritic check ./..."

[tasks.build]
description = "Build binary"
depends = ["test:coverage"]
run = """
#!/usr/bin/env bash
echo "Compiling binary..."
go build -o bin/jiraffe-$(uname -s | tr 'A-Z' 'a-z')-$(uname -m) .
"""

[tasks.all]
description = "Run the full pipeline: clean -> lint -> build"
depends = ["clean", "lint", "critic", "build"]

[env]
HK_MISE=1
GO111MODULE="on"
